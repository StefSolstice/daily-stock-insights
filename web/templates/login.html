{% extends "base.html" %}

{% block title %}登录 - Daily Stock Insights{% endblock %}

{% block content_guest %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card shadow">
            <div class="card-body p-5">
                <h3 class="text-center mb-4">
                    <i class="bi bi-graph-up text-primary"></i> 股票分析系统
                </h3>
                <h5 class="text-center text-muted mb-4">登录</h5>
                
                <form method="POST">
                    <div class="mb-3">
                        <label for="username" class="form-label">用户名</label>
                        <input type="text" class="form-control" id="username" name="username" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">密码</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-box-arrow-in-right"></i> 登录
                    </button>
                </form>
                
                <hr class="my-4">
                
                <div class="text-center">
                    <small class="text-muted">还没有账号？</small>
                    <a href="{{ url_for('register') }}" class="text-decoration-none">注册</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
