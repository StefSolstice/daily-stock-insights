{% extends "base.html" %}

{% block title %}注册 - Daily Stock Insights{% endblock %}

{% block content_guest %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card shadow">
            <div class="card-body p-5">
                <h3 class="text-center mb-4">
                    <i class="bi bi-graph-up text-primary"></i> 股票分析系统
                </h3>
                <h5 class="text-center text-muted mb-4">注册账号</h5>
                
                <form method="POST">
                    <div class="mb-3">
                        <label for="username" class="form-label">用户名</label>
                        <input type="text" class="form-control" id="username" name="username" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">密码</label>
                        <input type="password" class="form-control" id="password" name="password" required minlength="6">
                        <div class="form-text">至少 6 个字符</div>
                    </div>
                    <div class="mb-3">
                        <label for="confirm_password" class="form-label">确认密码</label>
                        <input type="password" class="form-control" id="confirm_password" name="confirm_password" required minlength="6">
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-person-plus"></i> 注册
                    </button>
                </form>
                
                <hr class="my-4">
                
                <div class="text-center">
                    <small class="text-muted">已有账号？</small>
                    <a href="{{ url_for('login') }}" class="text-decoration-none">登录</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
