{% extends "base.html" %}

{% block title %}选股策略 - Daily Stock Insights{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-filter"></i> 智能选股</h2>
    <div class="btn-group">
        <button class="btn btn-primary" onclick="startScan()">
            <i class="bi bi-play-fill"></i> 开始选股
        </button>
        <button class="btn btn-outline-secondary" onclick="location.reload()">
            <i class="bi bi-arrow-clockwise"></i> 刷新
        </button>
    </div>
</div>

<div class="alert alert-info">
    <i class="bi bi-info-circle"></i> 
    选股策略综合考虑技术面、基本面和资金面三个维度，筛选满足多重条件的优质股票。
    扫描范围：A股前50只股票（避免API限制）。
</div>

<div id="loading" class="text-center py-5" style="display: none;">
    <div class="spinner-border text-primary"></div>
    <p class="mt-3 text-muted">正在扫描股票，请稍候...</p>
    <p class="small text-muted">这可能需要几分钟时间</p>
</div>

<div id="resultsSection" style="display: none;">
    <div class="card mb-4">
        <div class="card-header">
            <i class="bi bi-check-circle"></i> 筛选结果
            <span id="resultCount" class="badge bg-success ms-2">0</span>
        </div>
        <div class="card-body">
            <div id="resultsList"></div>
        </div>
    </div>
</div>

<div id="scanStatus" class="card mb-4" style="display: none;">
    <div class="card-header">
        <i class="bi bi-hourglass-split"></i> 扫描状态
    </div>
    <div class="card-body">
        <div class="d-flex align-items-center">
            <div class="spinner-border spinner-border-sm text-primary me-3"></div>
            <div>
                <div id="statusText">正在获取股票列表...</div>
                <small class="text-muted" id="progressText"></small>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
let isScanning = false;

async function startScan() {
    if (isScanning) return;
    
    isScanning = true;
    document.getElementById('loading').style.display = 'block';
    document.getElementById('resultsSection').style.display = 'none';
    document.getElementById('scanStatus').style.display = 'block';
    document.getElementById('statusText').textContent = '正在扫描股票...';
    
    try {
        const response = await fetch('/api/selection/scan', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ limit: 10 })
        });
        
        const data = await response.json();
        
        if (data.error) {
            alert('选股失败：' + data.error);
            return;
        }
        
        document.getElementById('statusText').textContent = '扫描完成！';
        document.getElementById('progressText').textContent = `找到 ${data.count} 只符合条件的股票`;
        
        renderResults(data.results);
    } catch (e) {
        alert('选股失败：' + e.message);
    } finally {
        isScanning = false;
        document.getElementById('loading').style.display = 'none';
    }
}

function renderResults(results) {
    document.getElementById('resultsSection').style.display = 'block';
    document.getElementById('resultCount').textContent = results.length;
    
    const container = document.getElementById('resultsList');
    
    if (!results || results.length === 0) {
        container.innerHTML = '<p class="text-muted text-center py-4">没有找到符合条件的股票</p>';
        return;
    }
    
    let html = '<div class="table-responsive"><table class="table table-hover">';
    html += '<thead><tr>';
    html += '<th>股票代码</th>';
    html += '<th>总分</th>';
    html += '<th>技术面</th>';
    html += '<th>基本面</th>';
    html += '<th>资金面</th>';
    html += '<th>操作</th>';
    html += '</tr></thead><tbody>';
    
    results.forEach(r => {
        html += '<tr>';
        html += `<td><code>${r.ts_code}</code></td>`;
        html += `<td><span class="badge bg-primary">${r.total_score}</span></td>`;
        html += `<td><span class="text-${r.tech_score >= 4 ? 'success' : r.tech_score >= 2 ? 'warning' : 'secondary'}">${r.tech_score}分</span></td>`;
        html += `<td><span class="text-${r.fund_score >= 2 ? 'success' : 'secondary'}">${r.fund_score}分</span></td>`;
        html += `<td><span class="text-${r.money_score >= 2 ? 'success' : 'secondary'}">${r.money_score}分</span></td>`;
        html += `<td><button class="btn btn-sm btn-outline-primary" onclick="viewDetail('${r.ts_code}')">详情</button></td>`;
        html += '</tr>';
    });
    
    html += '</tbody></table></div>';
    container.innerHTML = html;
}

async function viewDetail(tsCode) {
    try {
        const response = await fetch('/api/selection/analyze', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ ts_code: tsCode })
        });
        
        const data = await response.json();
        
        if (data.error) {
            alert('分析失败：' + data.error);
            return;
        }
        
        let detailHtml = '<div class="table-responsive mt-3">';
        detailHtml += `<h6>${data.ts_code} 详细分析</h6>`;
        detailHtml += `<p>综合评分：<strong>${data.total_score}</strong> 分`;
        detailHtml += ` | 推荐：${data.recommend ? '<span class="text-success">是</span>' : '<span class="text-danger">否</span>'}</p>`;
        
        detailHtml += '<table class="table table-sm">';
        detailHtml += '<tr><th colspan="2">技术面</th></tr>';
        detailHtml += `<tr><td>评分</td><td>${data.tech_score} / 7</td></tr>`;
        detailHtml += `<tr><td>满足条件</td><td>${data.tech_conditions_met.join(', ') || '无'}</td></tr>`;
        
        detailHtml += '<tr><th colspan="2">基本面</th></tr>';
        detailHtml += `<tr><td>评分</td><td>${data.fund_score} / 3</td></tr>`;
        detailHtml += `<tr><td>PE</td><td>${data.fund_pe || 'N/A'}</td></tr>`;
        detailHtml += `<tr><td>PB</td><td>${data.fund_pb || 'N/A'}</td></tr>`;
        
        detailHtml += '<tr><th colspan="2">资金面</th></tr>';
        detailHtml += `<tr><td>评分</td><td>${data.money_score} / 3</td></tr>`;
        detailHtml += `<tr><td>满足条件</td><td>${data.money_conditions_met.join(', ') || '无'}</td></tr>`;
        detailHtml += '</table>';
        
        detailHtml += `<p><a href="/analysis?ts_code=${tsCode}" class="btn btn-primary btn-sm">查看K线图</a></p>`;
        detailHtml += '</div>';
        
        const modal = document.createElement('div');
        modal.className = 'modal fade';
        modal.innerHTML = `
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">股票分析详情</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">${detailHtml}</div>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        new bootstrap.Modal(modal).show();
        modal.addEventListener('hidden.bs.modal', () => modal.remove());
        
    } catch (e) {
        alert('分析失败：' + e.message);
    }
}
</script>
{% endblock %}
