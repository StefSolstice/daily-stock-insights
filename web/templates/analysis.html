{% extends "base.html" %}

{% block title %}股票分析 - Daily Stock Insights{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-bar-chart"></i> 股票分析</h2>
    <div>
        <input type="text" class="form-control d-inline-block" id="tsCodeInput" 
               value="{{ ts_code }}" placeholder="输入股票代码" style="width: 200px;">
        <button class="btn btn-primary" onclick="loadAnalysis()">
            <i class="bi bi-search"></i> 分析
        </button>
    </div>
</div>

<div id="loading" class="text-center py-5">
    <div class="spinner-border text-primary"></div>
    <p class="mt-3 text-muted">正在分析，请稍候...</p>
</div>

<div id="analysisResult" style="display: none;">
    <div class="card mb-4">
        <div class="card-header">
            <i class="bi bi-info-circle"></i> 基本信息
        </div>
        <div class="card-body">
            <div class="row">
                <div class="col-md-3">
                    <h6 class="text-muted">股票代码</h6>
                    <h5 id="stockCode">-</h5>
                </div>
                <div class="col-md-3">
                    <h6 class="text-muted">最新价</h6>
                    <h5 id="currentPrice">-</h5>
                </div>
                <div class="col-md-3">
                    <h6 class="text-muted">涨跌幅</h6>
                    <h5 id="changePercent">-</h5>
                </div>
                <div class="col-md-3">
                    <h6 class="text-muted">数据点数</h6>
                    <h5 id="dataPoints">-</h5>
                </div>
            </div>
        </div>
    </div>

    <div class="card mb-4">
        <div class="card-header">
            <i class="bi bi-graph-up"></i> 技术指标
        </div>
        <div class="card-body">
            <div class="row">
                <div class="col-md-4">
                    <h6>MA 均线</h6>
                    <div id="maIndicators" class="small"></div>
                </div>
                <div class="col-md-4">
                    <h6>MACD</h6>
                    <div id="macdIndicator" class="small"></div>
                </div>
                <div class="col-md-4">
                    <h6>KDJ</h6>
                    <div id="kdjIndicator" class="small"></div>
                </div>
            </div>
            <div class="row mt-3">
                <div class="col-md-4">
                    <h6>RSI</h6>
                    <div id="rsiIndicator" class="small"></div>
                </div>
                <div class="col-md-4">
                    <h6>BOLL</h6>
                    <div id="bollIndicator" class="small"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="card mb-4">
        <div class="card-header">
            <i class="bi bi-candlestick-chart"></i> K 线图
        </div>
        <div class="card-body">
            <div id="klineChart" style="height: 400px;"></div>
        </div>
    </div>

    <div class="card mb-4">
        <div class="card-header">
            <i class="bi bi-activity"></i> 技术指标图
        </div>
        <div class="card-body">
            <div id="indicatorChart" style="height: 400px;"></div>
        </div>
    </div>

    <div class="text-center mb-4">
        <button class="btn btn-success me-2" onclick="addToWatchlist()">
            <i class="bi bi-plus-circle"></i> 加入自选
        </button>
        <button class="btn btn-info text-white" onclick="exportData()">
            <i class="bi bi-download"></i> 导出数据
        </button>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
<script>
let currentData = null;

async function loadAnalysis() {
    const tsCode = document.getElementById('tsCodeInput').value.trim();
    if (!tsCode) {
        alert('请输入股票代码');
        return;
    }
    
    document.getElementById('loading').style.display = 'block';
    document.getElementById('analysisResult').style.display = 'none';
    
    try {
        const response = await fetch(`/api/analyze?ts_code=${tsCode}`);
        const data = await response.json();
        
        if (data.error) {
            alert(data.error);
            document.getElementById('loading').style.display = 'none';
            return;
        }
        
        currentData = data;
        renderAnalysis(data);
    } catch (e) {
        alert('分析失败：' + e.message);
    } finally {
        document.getElementById('loading').style.display = 'none';
    }
}

function renderAnalysis(data) {
    document.getElementById('analysisResult').style.display = 'block';
    
    document.getElementById('stockCode').textContent = data.ts_code || '-';
    document.getElementById('currentPrice').textContent = data.current_price ? data.current_price.toFixed(2) : '-';
    document.getElementById('dataPoints').textContent = data.chart_data ? data.chart_data.length : '-';
    
    const change = data.change_percent || 0;
    const changeElem = document.getElementById('changePercent');
    changeElem.textContent = (change >= 0 ? '+' : '') + change.toFixed(2) + '%';
    changeElem.className = change >= 0 ? 'text-success' : 'text-danger';
    
    if (data.technical) {
        const t = data.technical;
        document.getElementById('maIndicators').innerHTML = 
            `MA5: ${t.ma5 || '-'} | MA10: ${t.ma10 || '-'} | MA20: ${t.ma20 || '-'} | MA60: ${t.ma60 || '-'}`;
        document.getElementById('macdIndicator').innerHTML = 
            `MACD: ${t.macd || '-'} | Signal: ${t.signal || '-'}`;
        document.getElementById('kdjIndicator').innerHTML = 
            `K: ${t.kdj_k || '-'} | D: ${t.kdj_d || '-'} | J: ${t.kdj_j || '-'}`;
        document.getElementById('rsiIndicator').textContent = t.rsi || '-';
        document.getElementById('bollIndicator').innerHTML = 
            `上轨: ${t.bb_upper || '-'} | 中轨: ${t.bb_middle || '-'} | 下轨: ${t.bb_lower || '-'}`;
    }
    
    if (data.chart_data && data.chart_data.length > 0) {
        renderKlineChart(data.chart_data);
        renderIndicatorChart(data.chart_data);
    }
}

function renderKlineChart(chartData) {
    const dates = chartData.map(d => d.date);
    const opens = chartData.map(d => d.open);
    const highs = chartData.map(d => d.high);
    const lows = chartData.map(d => d.low);
    const closes = chartData.map(d => d.close);
    const vols = chartData.map(d => d.vol);
    
    const traceCandlestick = {
        type: 'candlestick',
        x: dates,
        open: opens,
        high: highs,
        low: lows,
        close: closes,
        name: 'K线',
        yaxis: 'y',
    };
    
    const traceVol = {
        type: 'bar',
        x: dates,
        y: vols,
        name: '成交量',
        yaxis: 'y2',
        marker: { color: closes.map(c => c >= opens[0] ? 'rgba(255,0,0,0.5)' : 'rgba(0,255,0,0.5)') }
    };
    
    const layout = {
        grid: { rows: 2, columns: 1, subplots: [['xy'], ['x,y2']], roworder: 'top to bottom' },
        yaxis: { title: '价格', domain: [0.35, 1] },
        yaxis2: { title: '成交量', domain: [0, 0.25] },
        xaxis: { rangeslider: { visible: false } },
        dragmode: 'pan',
        showlegend: true,
        legend: { orientation: 'h', y: 1.1, x: 0.5, xanchor: 'center' }
    };
    
    Plotly.newPlot('klineChart', [traceCandlestick, traceVol], layout, { responsive: true });
}

function renderIndicatorChart(chartData) {
    const dates = chartData.map(d => d.date);
    
    const traceRSI = {
        type: 'scatter',
        mode: 'lines',
        name: 'RSI',
        x: dates,
        y: chartData.map(d => d.rsi),
        line: { color: 'purple' }
    };
    
    const traceK = {
        type: 'scatter',
        mode: 'lines',
        name: 'K',
        x: dates,
        y: chartData.map(d => d.kdj_k),
        line: { color: 'blue' }
    };
    
    const traceD = {
        type: 'scatter',
        mode: 'lines',
        name: 'D',
        x: dates,
        y: chartData.map(d => d.kdj_d),
        line: { color: 'orange' }
    };
    
    const traceJ = {
        type: 'scatter',
        mode: 'lines',
        name: 'J',
        x: dates,
        y: chartData.map(d => d.kdj_j),
        line: { color: 'gray' }
    };
    
    const layout = {
        yaxis: { title: '指标值', domain: [0.6, 1] },
        yaxis2: { title: 'RSI', domain: [0, 0.35] },
        xaxis: { rangeslider: { visible: false } },
        dragmode: 'pan',
        showlegend: true,
        legend: { orientation: 'h', y: 1.1, x: 0.5, xanchor: 'center' }
    };
    
    Plotly.newPlot('indicatorChart', [traceRSI, traceK, traceD, traceJ], layout, { responsive: true });
}

function addToWatchlist() {
    if (!currentData || !currentData.ts_code) return;
    
    fetch('/api/stock/add', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            ts_code: currentData.ts_code,
            name: currentData.ts_code
        })
    }).then(r => {
        if (r.ok) {
            alert('已加入自选股');
        } else {
            r.json().then(d => alert(d.error || '添加失败'));
        }
    });
}

function exportData() {
    if (!currentData || !currentData.chart_data) {
        alert('暂无数据可导出');
        return;
    }
    
    const csvContent = 'data:text/csv;charset=utf-8,';
    const headers = ['日期', '开盘', '最高', '最低', '收盘', '成交量'];
    const rows = currentData.chart_data.map(d => 
        [d.date, d.open, d.high, d.low, d.close, d.vol]
    );
    
    const csv = csvContent + [headers, ...rows].map(r => r.join(',')).join('\n');
    const link = document.createElement('a');
    link.href = encodeURI(csv);
    link.download = `${currentData.ts_code}_${new Date().toISOString().split('T')[0]}.csv`;
    link.click();
}

loadAnalysis();
</script>
{% endblock %}
