{% extends "base.html" %}

{% block title %}仪表盘 - Daily Stock Insights{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-speedometer2"></i> 仪表盘</h2>
</div>

<div class="row mb-4">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <h6 class="text-muted mb-1">自选股总数</h6>
                        <h3 class="mb-0">{{ total_stocks }}</h3>
                    </div>
                    <i class="bi bi-star-fill text-warning" style="font-size: 2rem;"></i>
                </div>
            </div>
        </div>
    </div>
    <div class="col-md-6">
        <div class="card">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <h6 class="text-muted mb-1">分类数量</h6>
                        <h3 class="mb-0">{{ categories|length }}</h3>
                    </div>
                    <i class="bi bi-folder-fill text-info" style="font-size: 2rem;"></i>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="card">
    <div class="card-header">
        <i class="bi bi-star"></i> 我的自选股
    </div>
    <div class="card-body text-center">
        <a href="{{ url_for('stocks.watchlist') }}" class="btn btn-primary">
            <i class="bi bi-list"></i> 查看全部自选股
        </a>
    </div>
</div>
{% endblock %}
